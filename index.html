<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG V2.1</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
}

.version{
font-size:14px;
color:#aaa;
}

.game{
max-width:480px;
margin:auto;
padding:10px;
}

.panel{
background:#1b1b1b;
padding:10px;
margin:8px 0;
border-radius:10px;
}

.bar{
width:100%;
height:20px;
background:#333;
border-radius:10px;
margin:5px 0;
}

.hpbar{background:red;height:20px;border-radius:10px;}
.enemybar{background:lime;height:15px;border-radius:10px;}

button{
background:#333;
color:white;
border:none;
margin:3px;
padding:8px 12px;
border-radius:6px;
}

.item{
background:#222;
padding:6px;
margin:5px;
border-radius:8px;
}

.common{color:white}
.rare{color:#66aaff}
.epic{color:#cc66ff}
.legend{color:gold}
.mythic{color:red}
.boss{color:#ff4444;font-weight:bold}
</style>

</head>

<body>

<div class="game">

<h2>🏯塔RPG <span class="version">V2.1</span></h2>

<div class="panel">
<h3 id="enemy"></h3>

<div class="bar">
<div id="enemybar" class="enemybar"></div>
</div>

<div id="enemyHP"></div>
</div>

<div class="panel">

階層 <span id="floor"></span>

<div class="bar">
<div id="hpbar" class="hpbar"></div>
</div>

HP <span id="hp"></span><br>
MP <span id="mp"></span><br>

Lv <span id="level"></span><br>
EXP <span id="exp"></span><br>

💰 <span id="gold"></span>

</div>

<div class="panel">

<button onclick="playerAttack()">⚔攻撃</button> <button onclick="toggleAuto()">🤖オート</button>

<br>

優先スキル <select id="prioritySkill">

<option value="0">🔥</option>
<option value="1">❄</option>
<option value="2">⚡</option>
<option value="3">💖</option>
</select>

<div id="skills"></div>

</div>

<div class="panel">

<h3>🎒装備</h3>

<button onclick="sortATK()">ATK</button> <button onclick="sortDEF()">DEF</button> <button onclick="sortMP()">MP</button> <button onclick="sortRare()">レア</button>

<button onclick="combine()">🔨合成</button>

<div id="inventory"></div>

</div>

<div class="panel">

<h3>🏪ショップ</h3>

<button onclick="buyPotion()">HPポーション 20G</button> <button onclick="gacha()">装備ガチャ 100G</button>

</div>

<button onclick="save()">💾セーブ</button>

</div>

<script>

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMP=50
let playerMaxMP=50

let attack=5
let defense=2

let gold=100

let enemy=""
let enemyHP=0
let enemyMax=0

let auto=false
let prioritySkill=2

let inventory=[]

let uraTower=false

let rarity=["common","rare","epic","legend","mythic","boss"]

function spawnEnemy(){

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

enemyMax=20+floor*5

if(uraTower)enemyMax*=5

if(floor%10==0){
enemy="🐉ボス"
enemyMax=200+floor*10
}

if(floor==200 && !uraTower){
enemy="👑塔の支配者"
enemyMax=5000
}

enemyHP=enemyMax

document.getElementById("enemy").innerText=enemy

}

function playerAttack(){

enemyHP-=attack

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

if(enemyHP<=0){

if(enemy=="👑塔の支配者"){
alert("🏆塔クリア！裏の塔解放")
uraTower=true
floor=201
spawnEnemy()
update()
return
}

gold+=10+floor
exp+=5

dropItem()

setTimeout(next,200)

}else{

enemyAttack()

}

update()

}

function enemyAttack(){

let dmg=5+floor-defense

if(uraTower)dmg*=2

if(dmg<1)dmg=1

playerHP-=dmg

if(playerHP<=0){
alert("ゲームオーバー")
location.reload()
}

}

let skills=[

{name:"🔥ファイア",cost:20,action(){
if(playerMP<20)return
playerMP-=20
enemyHP-=attack*3
}},

{name:"❄アイス",cost:15,action(){
if(playerMP<15)return
playerMP-=15
enemyHP-=attack*2
}},

{name:"⚡サンダー",cost:25,action(){
if(playerMP<25)return
playerMP-=25
enemyHP-=attack*2.5
}},

{name:"💖ヒール",cost:15,action(){
if(playerMP<15)return
playerMP-=15
playerHP+=30
if(playerHP>playerMax)playerHP=playerMax
}}

]

function drawSkills(){

let html=""

skills.forEach((s,i)=>{
html+=`<button onclick="useSkill(${i})">${s.name}</button>`
})

document.getElementById("skills").innerHTML=html

}

function useSkill(i){

skills[i].action()

if(enemyHP<=0){

gold+=10+floor
exp+=5

dropItem()

setTimeout(next,200)

}else{

enemyAttack()

}

update()

}

function autoBattle(){

if(!auto)return

let skill=skills[prioritySkill]

if(playerMP>=skill.cost){

skill.action()

}else{

playerAttack()

}

update()

}

setInterval(autoBattle,1000)

function toggleAuto(){
auto=!auto
}

function createItem(r){

let types=["sword","armor","ring"]
let type=types[Math.floor(Math.random()*3)]

let atk=Math.floor(Math.random()*20)+floor
let def=Math.floor(Math.random()*15)
let mp=Math.floor(Math.random()*20)

return{type,atk,def,mp,rarity:r,level:1}

}

function dropItem(){

let isBoss=enemy.includes("ボス")||enemy=="👑塔の支配者"

if(isBoss && Math.random()<0.1){

let item=createItem("boss")

item.atk+=30
item.def+=20
item.mp+=30

inventory.push(item)

drawInventory()

return
}

if(Math.random()>0.3)return

let r=rarity[Math.floor(Math.random()*5)]

inventory.push(createItem(r))

drawInventory()

}

function drawInventory(){

let html=""

inventory.forEach((i,index)=>{

let icon=""

if(i.type=="sword") icon="⚔"
if(i.type=="armor") icon="🛡"
if(i.type=="ring") icon="💍"

html+=`
<div class="item ${i.rarity}">
${icon} Lv${i.level}<br>
ATK:${i.atk} DEF:${i.def} MP:${i.mp}
<br>
<button onclick="equip(${index})">装備</button>
<button onclick="upgrade(${index})">強化</button>
</div>
`

})

document.getElementById("inventory").innerHTML=html

}

function equip(i){

let item=inventory[i]

attack+=item.atk
defense+=item.def
playerMaxMP+=item.mp

update()

}

function upgrade(i){

let item=inventory[i]

let cost=item.level*50

if(gold<cost)return

gold-=cost

item.level++

item.atk+=2
item.def+=1
item.mp+=2

drawInventory()
update()

}

function combine(){

let groups={}

inventory.forEach((i,index)=>{
if(!groups[i.rarity])groups[i.rarity]=[]
groups[i.rarity].push(index)
})

for(let r in groups){

if(groups[r].length>=3){

let a=groups[r].slice(0,3)

a.reverse().forEach(i=>inventory.splice(i,1))

let next=rarity.indexOf(r)+1
if(next>=rarity.length)next=rarity.length-1

inventory.push(createItem(rarity[next]))

break

}

}

drawInventory()

}

function sortATK(){inventory.sort((a,b)=>b.atk-a.atk);drawInventory()}
function sortDEF(){inventory.sort((a,b)=>b.def-a.def);drawInventory()}
function sortMP(){inventory.sort((a,b)=>b.mp-a.mp);drawInventory()}

function sortRare(){

let order={common:1,rare:2,epic:3,legend:4,mythic:5,boss:6}

inventory.sort((a,b)=>order[b.rarity]-order[a.rarity])

drawInventory()

}

function buyPotion(){

if(gold<20)return

gold-=20

playerHP+=50
if(playerHP>playerMax)playerHP=playerMax

}

function gacha(){

if(gold<100)return

gold-=100

let r=rarity[Math.floor(Math.random()*5)]

inventory.push(createItem(r))

drawInventory()

}

function next(){

floor++

spawnEnemy()

update()

}

function levelUp(){

if(exp>=expMax){

exp-=expMax
level++

expMax=Math.floor(expMax*1.4)

playerMax+=20
playerMaxMP+=10
attack+=2
defense+=1

playerHP=playerMax
playerMP=playerMaxMP

}

}

function save(){

let data={floor,level,exp,gold,inventory,uraTower}

localStorage.setItem("towerRPG",JSON.stringify(data))

}

function update(){

levelUp()

document.getElementById("floor").innerText=floor
document.getElementById("hp").innerText=playerHP+"/"+playerMax
document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP
document.getElementById("level").innerText=level
document.getElementById("exp").innerText=exp+"/"+expMax
document.getElementById("gold").innerText=gold
document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"
document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

}

spawnEnemy()
drawSkills()
drawInventory()
update()

</script>

</body>
</html>
