<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG V2.6</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

.game{
max-width:500px;
margin:auto;
padding:12px;
}

h2{
text-align:center;
margin:5px;
}

.panel{
background:#1c1c1c;
padding:12px;
margin:10px 0;
border-radius:12px;
}

.bar{
width:100%;
height:22px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.hpbar{
background:#ff4444;
height:100%;
}

.enemybar{
background:#44ff44;
height:100%;
}

.bigbtn{
width:100%;
padding:14px;
font-size:18px;
margin:5px 0;
background:#444;
border:none;
color:white;
border-radius:10px;
}

button{
background:#333;
border:none;
color:white;
padding:8px;
margin:3px;
border-radius:8px;
}

.skillbar{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.skillbar button{
flex:1;
margin:3px;
}

.inventory{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.item{
background:#222;
padding:8px;
border-radius:10px;
font-size:14px;
}

.common{color:white}
.rare{color:#66aaff}
.epic{color:#cc66ff}
.legend{color:gold}
.mythic{color:#ff4444}
.boss{color:#ff0000;font-weight:bold}

.log{
background:#000;
padding:8px;
height:110px;
overflow:auto;
font-size:13px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="game">

<h2>🏯塔RPG V2.6</h2>

<div class="panel">

<div id="enemy"></div>

<div class="bar">
<div id="enemybar" class="enemybar"></div>
</div>

<div id="enemyHP"></div>

</div>

<div class="panel">

階層 <span id="floor"></span>

<div class="bar">
<div id="hpbar" class="hpbar"></div>
</div>

HP <span id="hp"></span><br>
MP <span id="mp"></span><br>
Lv <span id="level"></span><br>
EXP <span id="exp"></span><br>
💰 <span id="gold"></span>

</div>

<div class="panel">

<button class="bigbtn" onclick="playerAttack()">⚔ 攻撃</button>

<button class="bigbtn" onclick="toggleAuto()">🤖 オート</button>

優先スキル <select id="prioritySkill">

<option value="0">🔥ファイア</option>
<option value="1">❄アイス</option>
<option value="2">⚡サンダー</option>
  {
name:"🩸ドレイン",
cost:20,
action(){

if(playerMP<20)return

playerMP-=20

let dmg=attack*2

enemyHP-=dmg

let heal=Math.floor(dmg/2)

playerHP+=heal

if(playerHP>playerMax)playerHP=playerMax

log("🩸 "+dmg+"ダメージ / "+heal+"回復")

battleCheck()

}
}
</select>

<div id="skills" class="skillbar"></div>

</div>

<div class="panel">

<h3>🎒装備</h3>

<button onclick="sortATK()">ATK</button> <button onclick="sortDEF()">DEF</button> <button onclick="sortMP()">MP</button>

<button onclick="combine()">🔨合成</button>

<div id="inventory" class="inventory"></div>

</div>

<div class="panel">

<h3>🏪ショップ</h3>

<button onclick="buyPotion()">HPポーション 20G</button>

<button onclick="gacha()">装備ガチャ 100G</button>

</div>

<button class="bigbtn" onclick="save()">💾セーブ</button>

<div class="panel">

<h3>⚔戦闘ログ</h3>

<div id="log" class="log"></div>

</div>

</div>

<script>

/* プレイヤー */

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMaxMP=50
let playerMP=50

let attack=5
let defense=2

let gold=100

/* 敵 */

let enemy=""
let enemyHP=0
let enemyMax=0

/* システム */

let auto=false
let inventory=[]

let rarity=["common","rare","epic","legend","mythic","boss"]

/* ログ */

let logHistory=[]

function log(t){

logHistory.unshift(t)

if(logHistory.length>8)logHistory.pop()

document.getElementById("log").innerHTML=logHistory.join("<br>")

}

/* 敵 */

function spawnEnemy(){

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

enemyMax=20+floor*5

if(floor%10==0){

enemy="🐉ボス"

enemyMax=200+floor*10

}

enemyHP=enemyMax

document.getElementById("enemy").innerText=enemy

}

/* 攻撃 */

function playerAttack(){

let dmg=attack

enemyHP-=dmg

log("⚔ "+dmg+"ダメージ")

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

battleCheck()

}

function enemyAttack(){

if(enemyHP<=0)return

let dmg=5+floor-defense

if(dmg<1)dmg=1

playerHP-=dmg

log("👾 "+dmg+"ダメージ")

if(playerHP<=0){

alert("ゲームオーバー")

location.reload()

}

}

/* 戦闘 */

function battleCheck(){

if(enemyHP<=0){

gold+=10+floor

exp+=5

dropItem()

setTimeout(next,300)

}else{

enemyAttack()

}

update()

}

/* スキル */

let skills=[

{name:"🔥",cost:20,action(){

if(playerMP<20)return

playerMP-=20

let dmg=attack*3

enemyHP-=dmg

log("🔥 "+dmg)

battleCheck()

}},

{name:"❄",cost:15,action(){

if(playerMP<15)return

playerMP-=15

let dmg=attack*2

enemyHP-=dmg

log("❄ "+dmg)

battleCheck()

}},

{name:"⚡",cost:25,action(){

if(playerMP<25)return

playerMP-=25

let dmg=attack*2.5

enemyHP-=dmg

log("⚡ "+dmg)

battleCheck()

}}

]

function drawSkills(){

let html=""

skills.forEach((s,i)=>{

html+=`<button onclick="skills[${i}].action()">${s.name}</button>`

})

document.getElementById("skills").innerHTML=html

}

/* オート */

function autoBattle(){

if(!auto)return

let p=Number(document.getElementById("prioritySkill").value)

if(playerMP>=skills[p].cost){

skills[p].action()

}else{

playerAttack()

}

}

setInterval(autoBattle,900)

function toggleAuto(){auto=!auto}

/* アイテム */

function createItem(r){

let types=["sword","armor","ring"]

let type=types[Math.floor(Math.random()*3)]

let atk=Math.floor(Math.random()*20)+floor
let def=Math.floor(Math.random()*15)
let mp=Math.floor(Math.random()*20)

return{type,atk,def,mp,rarity:r}

}

function dropItem(){

if(Math.random()>0.3)return

let r=rarity[Math.floor(Math.random()*5)]

inventory.push(createItem(r))

drawInventory()

}

/* 装備 */

function drawInventory(){

let html=""

inventory.forEach((i,index)=>{

let icon=""

if(i.type=="sword")icon="⚔"
if(i.type=="armor")icon="🛡"
if(i.type=="ring")icon="💍"

html+=`
<div class="item ${i.rarity}">
${icon}<br>
ATK:${i.atk}<br>
DEF:${i.def}<br>
MP:${i.mp}<br>

<button onclick="equip(${index})">装備</button>
<button onclick="sell(${index})">売却</button>
</div>
`

})

document.getElementById("inventory").innerHTML=html

}

function equip(i){

let item=inventory[i]

attack+=item.atk
defense+=item.def
playerMaxMP+=item.mp

update()

}

function sell(i){

let item=inventory[i]

let price={common:10,rare:30,epic:80,legend:200,mythic:500,boss:1000}

gold+=price[item.rarity]||10

inventory.splice(i,1)

drawInventory()

update()

}

function combine(){

let groups={}

inventory.forEach((i,index)=>{

if(!groups[i.rarity])groups[i.rarity]=[]

groups[i.rarity].push(index)

})

for(let r in groups){

if(groups[r].length>=3){

let a=groups[r].slice(0,3)

a.reverse().forEach(i=>inventory.splice(i,1))

let next=rarity.indexOf(r)+1

inventory.push(createItem(rarity[next]))

break

}

}

drawInventory()

}

/* 並び替え */

function sortATK(){inventory.sort((a,b)=>b.atk-a.atk);drawInventory()}
function sortDEF(){inventory.sort((a,b)=>b.def-a.def);drawInventory()}
function sortMP(){inventory.sort((a,b)=>b.mp-a.mp);drawInventory()}

/* ショップ */

function buyPotion(){

if(gold<20)return

gold-=20

playerHP+=50

if(playerHP>playerMax)playerHP=playerMax

update()

}

function gacha(){

if(gold<100)return

gold-=100

let r=rarity[Math.floor(Math.random()*5)]

inventory.push(createItem(r))

drawInventory()

}

/* 次 */

function next(){

floor++

spawnEnemy()

update()

}

/* レベル */

function levelUp(){

if(exp>=expMax){

exp-=expMax

level++

expMax=Math.floor(expMax*1.4)

playerMax+=20
attack+=2
defense+=1
playerMaxMP+=10

playerHP=playerMax
playerMP=playerMaxMP

}

}

/* セーブ */

function save(){

let data={floor,level,gold,inventory}

localStorage.setItem("towerRPG",JSON.stringify(data))

}

/* 更新 */

function update(){

levelUp()

document.getElementById("floor").innerText=floor
document.getElementById("hp").innerText=playerHP+"/"+playerMax
document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP
document.getElementById("level").innerText=level
document.getElementById("exp").innerText=exp+"/"+expMax
document.getElementById("gold").innerText=gold
document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"
document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

}

spawnEnemy()
drawSkills()
drawInventory()
update()

</script>

</body>
</html>
